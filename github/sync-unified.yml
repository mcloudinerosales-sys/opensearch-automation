name: OpenSearch Unified Sync

on:
  workflow_dispatch: # Manual trigger
  schedule:
    # 4:00 AM PH Time (20:00 UTC)
    - cron: '0 20 * * *'

jobs:
  build:
    runs-on: payconnect-arc-runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Dito dapat ang timeout, sa labas ng 'with'
        timeout-minutes: 5

      - name: Install Dependencies
        run: npm install

      - name: Create Auth File
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Run Script
        env:
          OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
          OPENSEARCH_USERNAME: ${{ secrets.OPENSEARCH_USERNAME }}
          OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
        # Kung malaki ang data (58k rows), baka kailangan mo rin lagyan ng timeout dito
        run: node unified-recon.js
        timeout-minutes: 15
